<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model Test — Cat &amp; Wolf GLB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #eee; font-family: monospace; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; color: #fff; z-index: 20;
        }
        #controls {
            position: absolute; top: 16px; right: 16px;
            background: rgba(0,0,0,0.85); padding: 16px; border-radius: 8px;
            font-size: 13px; line-height: 2; z-index: 10; width: 320px;
            max-height: 90vh; overflow-y: auto;
        }
        #controls h3 { color: #f0c040; margin: 8px 0 4px; font-size: 14px; }
        #controls h3:first-child { margin-top: 0; }
        #controls label { display: flex; align-items: center; gap: 8px; }
        #controls input[type=range] { flex: 1; }
        #controls .val { color: #888; min-width: 50px; text-align: right; font-size: 12px; }
        #controls .row { display: flex; align-items: center; gap: 8px; margin: 2px 0; }
        #controls input[type=checkbox] { margin: 0; }
        #controls button {
            background: #444; color: #eee; border: 1px solid #666; padding: 4px 12px;
            border-radius: 4px; cursor: pointer; margin-top: 8px;
        }
        #controls button:hover { background: #555; }
        #info {
            position: absolute; top: 16px; left: 16px;
            background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px;
            font-size: 13px; line-height: 1.6; z-index: 10;
        }
        #info .label { color: #888; }
    </style>
</head>
<body>
    <div id="loading">Loading models...</div>
    <div id="info">
        <div><span class="label">Cat:</span> <span id="cat-status">loading...</span></div>
        <div><span class="label">Wolf:</span> <span id="wolf-status">loading...</span></div>
        <div style="margin-top:4px"><span class="label">Controls:</span> drag=orbit, scroll=zoom</div>
    </div>
    <div id="controls">
        <h3>UV Adjustments (both models)</h3>

        <div class="row">
            <label>Offset U <input type="range" id="uOffset" min="-1" max="1" step="0.01" value="0"><span class="val" id="uOffsetVal">0</span></label>
        </div>
        <div class="row">
            <label>Offset V <input type="range" id="vOffset" min="-1" max="1" step="0.01" value="0"><span class="val" id="vOffsetVal">0</span></label>
        </div>
        <div class="row">
            <label>Scale U <input type="range" id="uScale" min="-3" max="3" step="0.01" value="1"><span class="val" id="uScaleVal">1</span></label>
        </div>
        <div class="row">
            <label>Scale V <input type="range" id="vScale" min="-3" max="3" step="0.01" value="1"><span class="val" id="vScaleVal">1</span></label>
        </div>
        <div class="row">
            <label>Rotation <input type="range" id="uvRotation" min="0" max="6.28" step="0.01" value="0"><span class="val" id="uvRotationVal">0</span></label>
        </div>

        <h3>Flip</h3>
        <div class="row">
            <label><input type="checkbox" id="flipU"> Flip U (horizontal)</label>
        </div>
        <div class="row">
            <label><input type="checkbox" id="flipV"> Flip V (vertical)</label>
        </div>
        <div class="row">
            <label><input type="checkbox" id="flipTexY"> texture.flipY</label>
        </div>

        <h3>Geometry UV Flip</h3>
        <div class="row">
            <label><input type="checkbox" id="geoFlipV"> Flip V in geometry UVs</label>
        </div>

        <h3>Quick Presets</h3>
        <button id="preset-default">Default</button>
        <button id="preset-flipV">Flip V</button>
        <button id="preset-flipGeoV">Geo Flip V</button>
        <button id="preset-negScaleV">Scale V = -1</button>

        <div style="margin-top: 12px; padding-top: 8px; border-top: 1px solid #333;">
            <div id="current-values" style="color: #0f0; font-size: 12px;"></div>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
    (function() {
        'use strict';

        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x1a1a2e);
        renderer.outputEncoding = THREE.sRGBEncoding;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 6);

        const controls = new THREE.OrbitControls(camera, canvas);
        controls.target.set(0, 1, 0);
        controls.enableDamping = true;
        controls.update();

        // Lighting
        scene.add(new THREE.AmbientLight(0xccccdd, 0.5));
        const dir = new THREE.DirectionalLight(0xfff5e0, 0.8);
        dir.position.set(-3, 5, 2);
        scene.add(dir);
        const fill = new THREE.DirectionalLight(0xaabbdd, 0.3);
        fill.position.set(2, 3, -2);
        scene.add(fill);

        scene.add(new THREE.GridHelper(20, 20, 0x444466, 0x333355));

        const texLoader = new THREE.TextureLoader();
        const mixers = [];
        const loader = new THREE.GLTFLoader();

        // Track all materials and original geometry UVs for live editing
        const allMaterials = [];
        const originalUVs = []; // { geometry, origArray }

        function loadTexture(path) {
            const tex = texLoader.load(path);
            tex.encoding = THREE.sRGBEncoding;
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.flipY = false;
            return tex;
        }

        let loaded = 0;
        function checkLoaded() {
            if (++loaded >= 2) document.getElementById('loading').style.display = 'none';
        }

        function loadModel(path, texBase, posX, targetHeight, statusId) {
            loader.load(path, (gltf) => {
                const model = gltf.scene;

                model.updateMatrixWorld(true);
                const box = new THREE.Box3().setFromObject(model);
                const size = new THREE.Vector3();
                box.getSize(size);
                const scale = targetHeight / size.y;
                model.scale.setScalar(scale);
                model.position.set(posX, 0, 0);

                // Apply textures
                const diffuse = loadTexture(texBase + '_Gr_D.png');
                const normal = texLoader.load(texBase + '_N.png');
                normal.wrapS = THREE.RepeatWrapping;
                normal.wrapT = THREE.RepeatWrapping;
                normal.flipY = false;

                model.traverse((child) => {
                    if (child.isSkinnedMesh || child.isMesh) {
                        const mat = new THREE.MeshStandardMaterial({
                            map: diffuse,
                            normalMap: normal,
                            roughness: 0.7,
                            metalness: 0.05,
                            skinning: child.isSkinnedMesh,
                        });
                        child.material = mat;
                        allMaterials.push(mat);

                        // Store original UVs for geometry-level flipping
                        const uvAttr = child.geometry.attributes.uv;
                        if (uvAttr) {
                            originalUVs.push({
                                geometry: child.geometry,
                                origArray: new Float32Array(uvAttr.array),
                            });
                        }
                    }
                });

                scene.add(model);
                document.getElementById(statusId).textContent = 'loaded';

                const mixer = new THREE.AnimationMixer(model);
                const runClip = gltf.animations.find(a => a.name.includes('Run_Forward'));
                if (runClip) mixer.clipAction(runClip).play();
                else if (gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();
                mixers.push(mixer);

                console.log(`${path} animations:`, gltf.animations.map(a => a.name));
                checkLoaded();
            }, undefined, (err) => {
                document.getElementById(statusId).textContent = 'FAILED';
                console.error(err);
                checkLoaded();
            });
        }

        loadModel('models/cat/Cat.glb', 'models/cat/T_Cat', -2, 2, 'cat-status');
        loadModel('models/wolf/Wolf.glb', 'models/wolf/T_Wolf', 2, 2.5, 'wolf-status');

        // ── UV Controls ──

        const els = {
            uOffset: document.getElementById('uOffset'),
            vOffset: document.getElementById('vOffset'),
            uScale: document.getElementById('uScale'),
            vScale: document.getElementById('vScale'),
            uvRotation: document.getElementById('uvRotation'),
            flipU: document.getElementById('flipU'),
            flipV: document.getElementById('flipV'),
            flipTexY: document.getElementById('flipTexY'),
            geoFlipV: document.getElementById('geoFlipV'),
        };

        function applyUVSettings() {
            const uOff = parseFloat(els.uOffset.value);
            const vOff = parseFloat(els.vOffset.value);
            let uSc = parseFloat(els.uScale.value);
            let vSc = parseFloat(els.vScale.value);
            const rot = parseFloat(els.uvRotation.value);
            const flipU = els.flipU.checked;
            const flipV = els.flipV.checked;
            const flipTexY = els.flipTexY.checked;
            const geoFlipV = els.geoFlipV.checked;

            if (flipU) uSc = -uSc;
            if (flipV) vSc = -vSc;

            // Update display values
            document.getElementById('uOffsetVal').textContent = uOff.toFixed(2);
            document.getElementById('vOffsetVal').textContent = vOff.toFixed(2);
            document.getElementById('uScaleVal').textContent = parseFloat(els.uScale.value).toFixed(2);
            document.getElementById('vScaleVal').textContent = parseFloat(els.vScale.value).toFixed(2);
            document.getElementById('uvRotationVal').textContent = rot.toFixed(2);

            for (const mat of allMaterials) {
                if (mat.map) {
                    mat.map.offset.set(uOff, vOff);
                    mat.map.repeat.set(uSc, vSc);
                    mat.map.rotation = rot;
                    mat.map.flipY = flipTexY;
                    mat.map.needsUpdate = true;
                }
                if (mat.normalMap) {
                    mat.normalMap.offset.set(uOff, vOff);
                    mat.normalMap.repeat.set(uSc, vSc);
                    mat.normalMap.rotation = rot;
                    mat.normalMap.flipY = flipTexY;
                    mat.normalMap.needsUpdate = true;
                }
            }

            // Geometry UV flip
            for (const entry of originalUVs) {
                const uvAttr = entry.geometry.attributes.uv;
                const orig = entry.origArray;
                for (let i = 0; i < orig.length; i += 2) {
                    uvAttr.array[i] = orig[i];         // U stays
                    uvAttr.array[i + 1] = geoFlipV ? (1 - orig[i + 1]) : orig[i + 1];
                }
                uvAttr.needsUpdate = true;
            }

            // Show current values as copyable text
            document.getElementById('current-values').textContent =
                `{ offsetU: ${uOff}, offsetV: ${vOff}, scaleU: ${uSc.toFixed(2)}, scaleV: ${vSc.toFixed(2)}, rot: ${rot.toFixed(2)}, flipTexY: ${flipTexY}, geoFlipV: ${geoFlipV} }`;
        }

        // Bind all controls
        for (const el of Object.values(els)) {
            el.addEventListener('input', applyUVSettings);
            el.addEventListener('change', applyUVSettings);
        }

        // Presets
        function setPreset(vals) {
            els.uOffset.value = vals.uOff || 0;
            els.vOffset.value = vals.vOff || 0;
            els.uScale.value = vals.uSc || 1;
            els.vScale.value = vals.vSc || 1;
            els.uvRotation.value = vals.rot || 0;
            els.flipU.checked = vals.flipU || false;
            els.flipV.checked = vals.flipV || false;
            els.flipTexY.checked = vals.flipTexY || false;
            els.geoFlipV.checked = vals.geoFlipV || false;
            applyUVSettings();
        }

        document.getElementById('preset-default').onclick = () => setPreset({});
        document.getElementById('preset-flipV').onclick = () => setPreset({ flipV: true });
        document.getElementById('preset-flipGeoV').onclick = () => setPreset({ geoFlipV: true });
        document.getElementById('preset-negScaleV').onclick = () => setPreset({ vSc: -1 });

        // Render loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            for (const m of mixers) m.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    })();
    </script>
</body>
</html>
