<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model Viewer — All Creatures</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; color: #fff; z-index: 20;
        }
        #sidebar {
            position: absolute; top: 0; left: 0; bottom: 0; width: 220px;
            background: rgba(10,12,18,0.92); border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto; z-index: 10; padding: 12px 0;
        }
        #sidebar h2 { font-size: 16px; color: #f0c040; padding: 8px 16px; margin: 0; }
        .creature-btn {
            display: block; width: 100%; text-align: left; padding: 8px 16px;
            background: none; border: none; color: rgba(255,255,255,0.7);
            font-size: 14px; font-family: inherit; cursor: pointer;
        }
        .creature-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .creature-btn.active { background: rgba(93,173,226,0.2); color: #5dade2; font-weight: 700; }
        .creature-btn .status { font-size: 11px; color: rgba(255,255,255,0.3); margin-left: 4px; }
        .creature-btn.loaded .status { color: rgba(111,207,112,0.6); }
        .creature-btn.failed .status { color: rgba(231,76,60,0.6); }
        #info {
            position: absolute; bottom: 16px; left: 240px;
            background: rgba(10,12,18,0.85); padding: 12px 16px; border-radius: 8px;
            font-size: 13px; line-height: 1.8; z-index: 10;
        }
        #info .label { color: #888; }
        #anim-list {
            position: absolute; top: 16px; right: 16px;
            background: rgba(10,12,18,0.85); padding: 12px 16px; border-radius: 8px;
            font-size: 13px; z-index: 10; max-height: 80vh; overflow-y: auto; min-width: 200px;
        }
        #anim-list h3 { color: #f0c040; margin: 0 0 8px; font-size: 14px; }
        .anim-btn {
            display: block; width: 100%; text-align: left; padding: 4px 8px;
            background: none; border: none; color: rgba(255,255,255,0.7);
            font-size: 13px; font-family: inherit; cursor: pointer; border-radius: 3px;
        }
        .anim-btn:hover { background: rgba(255,255,255,0.08); }
        .anim-btn.active { color: #5dade2; font-weight: 700; }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <div id="sidebar">
        <h2>Creatures</h2>
        <div id="creature-list"></div>
    </div>
    <div id="info">
        <div><span class="label">Controls:</span> drag=orbit, scroll=zoom</div>
        <div><span class="label">Model:</span> <span id="model-name">—</span></div>
        <div><span class="label">Animations:</span> <span id="anim-count">—</span></div>
    </div>
    <div id="anim-list" style="display:none">
        <h3>Animations</h3>
        <div id="anim-buttons"></div>
    </div>
    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
    <script>
    (function() {
        'use strict';

        // All creatures with their file paths
        const CREATURES = [
            { name: 'Bat', dir: 'bat', glb: 'Bat.glb', diffuse: 'T_ForestBat_Bl_D.png', normal: 'T_ForestBat_N.png' },
            { name: 'Bear', dir: 'bear', glb: 'Bear.glb', diffuse: 'T_Bear_Bk_D.png', normal: 'T_Bear_N.png' },
            { name: 'Boar', dir: 'boar', glb: 'Boar.glb', diffuse: 'T_Boar_Bl_D.png', normal: 'T_Boar_N.png' },
            { name: 'Cat', dir: 'cat', glb: 'Cat.glb', diffuse: 'T_Cat_Gr_D.png', normal: 'T_Cat_N.png' },
            { name: 'Chicken', dir: 'chicken', glb: 'Chicken.glb', diffuse: 'T_Chicken_Bk_D.png', normal: 'T_Chicken_N.png' },
            { name: 'Cow', dir: 'cow', glb: 'Cow.glb', diffuse: 'T_Cow_Bk_D.png', normal: 'T_Cow_N.png' },
            { name: 'Crocodile', dir: 'crocodile', glb: 'Crocodile.glb', diffuse: 'T_Crocodile_Bl_D.png', normal: 'T_Crocodile_N.png' },
            { name: 'Eagle', dir: 'eagle', glb: 'Eagle.glb', diffuse: 'T_Eagle_Br_D.png', normal: 'T_Eagle_N.png' },
            { name: 'Goat', dir: 'goat', glb: 'Goat.glb', diffuse: 'T_Goat_Bk_D.png', normal: 'T_Goat_N.png' },
            { name: 'Hermit Crab', dir: 'hermitcrab', glb: 'CrabHermit.glb', diffuse: 'T_CrabHermit_Body_Bl_D.png', normal: 'T_CrabHermit_Body_N.png' },
            { name: 'Pig', dir: 'pig', glb: 'Pig.glb', diffuse: 'T_Pig_Bl_D.png', normal: 'T_Pig_N.png' },
            { name: 'Sheep', dir: 'sheep', glb: 'Sheep.glb', diffuse: 'T_Sheep_Bk_D.png', normal: 'T_Sheep_N.png' },
            { name: 'Small Dinosaur', dir: 'smalldinosaur', glb: 'SmallDinosaur.glb', diffuse: 'T_SmallDinosaur_Bl_D.png', normal: 'T_SmallDinosaur_N.png' },
            { name: 'Snail', dir: 'snail', glb: 'Snail.glb', diffuse: 'T_Snail_Bl_D.png', normal: 'T_Snail_N.png' },
            { name: 'Snake', dir: 'snake', glb: 'Snake.glb', diffuse: 'T_Snake_Bl_D.png', normal: 'T_Snake_N.png' },
            { name: 'Spider', dir: 'spider', glb: 'Spider.glb', diffuse: 'T_ForestSpider_Bl_D.png', normal: 'T_ForestSpider_N.png' },
            { name: 'Tiger', dir: 'tiger', glb: 'Tiger.glb', diffuse: 'T_Tiger_Bk_D.png', normal: 'T_Tiger_N.png' },
            { name: 'Toad', dir: 'toad', glb: 'Toad.glb', diffuse: 'T_Toad_Bl_D.png', normal: 'T_Toad_N.png' },
            { name: 'Turtle', dir: 'turtle', glb: 'Turtle.glb', diffuse: 'T_Turtle_Body_Bl_D.png', normal: 'T_Turtle_Body_N.png' },
            { name: 'Wasp', dir: 'wasp', glb: 'Wasp.glb', diffuse: 'T_ForestWasp_Bl_D.png', normal: 'T_ForestWasp_N.png' },
            { name: 'Wolf', dir: 'wolf', glb: 'Wolf.glb', diffuse: 'T_Wolf_Gr_D.png', normal: 'T_Wolf_N.png' },
        ];

        // Renderer
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x1a1a2e);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 6);

        const controls = new THREE.OrbitControls(camera, canvas);
        controls.target.set(0, 1, 0);
        controls.enableDamping = true;
        controls.update();

        // Lighting (same as game)
        scene.add(new THREE.AmbientLight(0xccccdd, 0.45));
        const dirLight = new THREE.DirectionalLight(0xfff5e0, 0.7);
        dirLight.position.set(-3, 5, 2);
        scene.add(dirLight);
        const fillLight = new THREE.DirectionalLight(0xaabbdd, 0.25);
        fillLight.position.set(2, 3, -2);
        scene.add(fillLight);

        scene.add(new THREE.GridHelper(20, 20, 0x444466, 0x333355));

        const gltfLoader = new THREE.GLTFLoader();
        const texLoader = new THREE.TextureLoader();

        // State
        let currentModel = null;
        let currentMixer = null;
        let currentAnimations = [];
        let currentAction = null;
        const cache = {}; // dir -> { model, animations }

        function loadTexture(path) {
            const tex = texLoader.load(path);
            tex.flipY = false;
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function showCreature(creature) {
            // Remove current
            if (currentModel) { scene.remove(currentModel); currentModel = null; }
            if (currentMixer) { currentMixer = null; }
            currentAnimations = [];
            currentAction = null;

            // Update sidebar
            document.querySelectorAll('.creature-btn').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`.creature-btn[data-dir="${creature.dir}"]`);
            if (btn) btn.classList.add('active');

            document.getElementById('model-name').textContent = creature.name;

            // Check cache
            if (cache[creature.dir]) {
                displayModel(creature, cache[creature.dir]);
                return;
            }

            const basePath = 'models/' + creature.dir + '/';

            gltfLoader.load(basePath + creature.glb, (gltf) => {
                const model = gltf.scene;

                // Apply textures (same as game does)
                const diffuse = loadTexture(basePath + creature.diffuse);
                const normal = loadTexture(basePath + creature.normal);

                model.traverse((child) => {
                    if (child.isSkinnedMesh || child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({
                            map: diffuse,
                            normalMap: normal,
                            roughness: 0.7,
                            metalness: 0.05,
                            skinning: child.isSkinnedMesh,
                        });
                    }
                });

                // Scale to ~2 units tall
                model.updateMatrixWorld(true);
                const box = new THREE.Box3().setFromObject(model);
                const size = new THREE.Vector3();
                box.getSize(size);
                const scale = 2 / size.y;
                model.scale.setScalar(scale);

                cache[creature.dir] = { model, animations: gltf.animations, scale };

                if (btn) { btn.classList.add('loaded'); btn.querySelector('.status').textContent = '✓'; }

                displayModel(creature, cache[creature.dir]);

                console.log(`${creature.name} animations:`, gltf.animations.map(a => a.name));
            }, undefined, (err) => {
                console.error(`Failed to load ${creature.name}:`, err);
                if (btn) { btn.classList.add('failed'); btn.querySelector('.status').textContent = '✗'; }
            });
        }

        function displayModel(creature, data) {
            // Clone so we can show it fresh
            const model = THREE.SkeletonUtils.clone(data.model);
            model.scale.setScalar(data.scale);
            model.position.set(0, 0, 0);
            scene.add(model);
            currentModel = model;

            // Set up animations
            currentAnimations = data.animations;
            const mixer = new THREE.AnimationMixer(model);
            currentMixer = mixer;

            document.getElementById('anim-count').textContent = currentAnimations.length;

            // Build animation buttons
            const animDiv = document.getElementById('anim-buttons');
            const animPanel = document.getElementById('anim-list');
            animDiv.innerHTML = '';

            if (currentAnimations.length > 0) {
                animPanel.style.display = '';
                for (const clip of currentAnimations) {
                    const btn = document.createElement('button');
                    btn.className = 'anim-btn';
                    btn.textContent = clip.name;
                    btn.addEventListener('click', () => {
                        playAnimation(clip.name);
                        animDiv.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                    animDiv.appendChild(btn);
                }

                // Play idle or first animation by default
                const defaultClip = currentAnimations.find(a => a.name.includes('Idle')) || currentAnimations[0];
                playAnimation(defaultClip.name);
                const defaultBtn = animDiv.querySelector('.anim-btn');
                if (defaultBtn) {
                    // Find the right button
                    animDiv.querySelectorAll('.anim-btn').forEach(b => {
                        if (b.textContent === defaultClip.name) b.classList.add('active');
                    });
                }
            } else {
                animPanel.style.display = 'none';
            }

            // Reset camera
            controls.target.set(0, 1, 0);
            camera.position.set(0, 2, 6);
            controls.update();
        }

        function playAnimation(name) {
            if (!currentMixer || !currentAnimations.length) return;
            const clip = currentAnimations.find(a => a.name === name);
            if (!clip) return;

            if (currentAction) currentAction.fadeOut(0.2);
            const action = currentMixer.clipAction(clip);
            action.reset().fadeIn(0.2).play();
            currentAction = action;
        }

        // Build sidebar
        const listEl = document.getElementById('creature-list');
        for (const c of CREATURES) {
            const btn = document.createElement('button');
            btn.className = 'creature-btn';
            btn.dataset.dir = c.dir;
            btn.innerHTML = `${c.name} <span class="status">...</span>`;
            btn.addEventListener('click', () => showCreature(c));
            listEl.appendChild(btn);
        }

        // Load first creature
        document.getElementById('loading').style.display = 'none';
        showCreature(CREATURES[0]);

        // Render loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentMixer) currentMixer.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    })();
    </script>
</body>
</html>
